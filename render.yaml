services:
  - type: web
    name: maas-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 60
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: MAAS_MASTER_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: RECENCY_DECAY_LAMBDA
        value: "0.01"