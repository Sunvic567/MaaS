version: "3.9"

services:
  remem-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - APP_ENV=${APP_ENV:-development}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3